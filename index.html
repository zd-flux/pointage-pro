<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1"/>
<title>PointagePro — Gestion des fiches de semaine</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet"/>

<style>
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  body{background:#EDEAE4;font-family:'Outfit',sans-serif;overscroll-behavior:none;}
  input[type=time]::-webkit-calendar-picker-indicator{opacity:0.4;cursor:pointer;}
  select{-webkit-appearance:none;appearance:none;}
  ::-webkit-scrollbar{width:4px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:#C8C4BC;border-radius:4px;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(16px);}to{opacity:1;transform:translateY(0);}}
  @keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
  @keyframes slideIn{from{opacity:0;transform:translateX(24px);}to{opacity:1;transform:translateX(0);}}
  .fade-up{animation:fadeUp 0.4s cubic-bezier(0.16,1,0.3,1) both;}
  .fade-in{animation:fadeIn 0.3s ease both;}
  .slide-in{animation:slideIn 0.35s cubic-bezier(0.16,1,0.3,1) both;}
  .card-hover{transition:transform 0.15s,box-shadow 0.15s;}
  .card-hover:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,0.1)!important;}
  .btn-press:active{transform:scale(0.97);}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useRef,useCallback}=React;

// ══════════════════════════════════════════════
//  DONNÉES MÉTIER
// ══════════════════════════════════════════════
const TYPES_HEURES=[
  {id:'normal',     label:'Heures normales',          taux:100, color:'#2563EB', desc:'Taux de base — 35h/semaine'},
  {id:'sup25',      label:'Heures supp. 25%',          taux:125, color:'#7C3AED', desc:'De la 36e à la 43e heure'},
  {id:'sup50',      label:'Heures supp. 50%',          taux:150, color:'#DB2777', desc:'À partir de la 44e heure'},
  {id:'nuit',       label:'Heures de nuit',            taux:125, color:'#0891B2', desc:'Entre 21h et 6h du matin'},
  {id:'ferie',      label:'Jours fériés travaillés',   taux:200, color:'#DC2626', desc:'Double salaire légal'},
  {id:'dimanche',   label:'Travail du dimanche',       taux:150, color:'#EA580C', desc:'Majoration 50% convention'},
];

const PRIMES=[
  {id:'repas',      label:'Panier repas',     montant:15,  unite:'/ jour',  icon:'🍽️',  color:'#F59E0B'},
  {id:'deplacement',label:'Déplacement',      montant:100, unite:'/ jour',  icon:'🚗',  color:'#3B82F6'},
  {id:'primeA',     label:'Prime A',          montant:10,  unite:'/ unité', icon:'⭐',  color:'#8B5CF6'},
  {id:'primeB',     label:'Prime B',          montant:20,  unite:'/ unité', icon:'⭐⭐', color:'#EC4899'},
  {id:'primeC',     label:'Prime C',          montant:30,  unite:'/ unité', icon:'⭐⭐⭐',color:'#10B981'},
  {id:'primeD',     label:'Prime D',          montant:40,  unite:'/ unité', icon:'💎',  color:'#F97316'},
  {id:'primeE',     label:'Prime E',          montant:50,  unite:'/ unité', icon:'👑',  color:'#EF4444'},
];

const JOURS=['Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi','Dimanche'];

// ══════════════════════════════════════════════
//  HELPERS
// ══════════════════════════════════════════════
const fmtH=h=>{
  if(!h||h===0)return'—';
  const hh=Math.floor(h),mm=Math.round((h-hh)*60);
  return mm?`${hh}h${String(mm).padStart(2,'0')}`:`${hh}h`;
};
const calcH=(debut,fin,pause=0)=>{
  if(!debut||!fin)return 0;
  const[dh,dm]=debut.split(':').map(Number);
  const[fh,fm]=fin.split(':').map(Number);
  return Math.max(0,((fh*60+fm)-(dh*60+dm)-pause)/60);
};
const semLabel=(sem,an)=>{
  const jan4=new Date(an,0,4);
  const d=new Date(jan4);
  d.setDate(jan4.getDate()-(jan4.getDay()||7)+1+(sem-1)*7);
  const end=new Date(d);end.setDate(d.getDate()+6);
  const f=dt=>dt.toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  return`${f(d)} – ${f(end)}`;
};
const totalHeures=jours=>Object.values(jours).reduce((s,j)=>{
  if(!j.travaille)return s;
  return s+Object.entries(j.heures||{}).reduce((a,[,v])=>a+calcH(v.debut,v.fin,v.pause),0);
},0);
const initJours=()=>Object.fromEntries(JOURS.map(j=>([j,{
  travaille:!['Samedi','Dimanche'].includes(j),
  heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}
}])));

// ══════════════════════════════════════════════
//  DONNÉES DÉMO
// ══════════════════════════════════════════════
const DEMO_FICHES=[
  {
    id:'f1',nomIntervenant:'Marie Dupont',equipe:'Équipe Nord',semaine:14,annee:2026,
    statut:'soumis',dateSoumission:'2026-04-01',
    jours:{
      Lundi:    {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true},sup25:{debut:'17:00',fin:'19:00',pause:0,actif:true}}},
      Mardi:    {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Mercredi: {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Jeudi:    {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true},nuit:{debut:'22:00',fin:'23:30',pause:0,actif:true}}},
      Vendredi: {travaille:true, heures:{normal:{debut:'08:00',fin:'16:00',pause:60,actif:true}}},
      Samedi:   {travaille:false,heures:{}},
      Dimanche: {travaille:false,heures:{}},
    },
    primes:[{id:'repas',qte:5},{id:'deplacement',qte:2},{id:'primeA',qte:3}],
    commentaire:'Intervention nocturne jeudi soir pour maintenance urgente.',
    commentaireResponsable:'',
  },
  {
    id:'f2',nomIntervenant:'Thomas Bernard',equipe:'Équipe Sud',semaine:14,annee:2026,
    statut:'refusé',dateSoumission:'2026-03-31',
    jours:{
      Lundi:    {travaille:true, heures:{normal:{debut:'07:00',fin:'16:00',pause:60,actif:true}}},
      Mardi:    {travaille:true, heures:{normal:{debut:'07:00',fin:'16:00',pause:60,actif:true}}},
      Mercredi: {travaille:false,heures:{}},
      Jeudi:    {travaille:true, heures:{normal:{debut:'07:00',fin:'16:00',pause:60,actif:true}}},
      Vendredi: {travaille:true, heures:{normal:{debut:'07:00',fin:'16:00',pause:60,actif:true}}},
      Samedi:   {travaille:true, heures:{dimanche:{debut:'08:00',fin:'13:00',pause:0,actif:true}}},
      Dimanche: {travaille:false,heures:{}},
    },
    primes:[{id:'repas',qte:4},{id:'primeB',qte:2}],
    commentaire:'',
    commentaireResponsable:"L'heure de fin du jeudi semble incorrecte. Merci de corriger avant de renvoyer.",
  },
  {
    id:'f3',nomIntervenant:'Sophie Martin',equipe:'Équipe Nord',semaine:14,annee:2026,
    statut:'validé',dateSoumission:'2026-03-30',dateSaisie:null,
    jours:{
      Lundi:    {travaille:true, heures:{normal:{debut:'09:00',fin:'18:00',pause:60,actif:true}}},
      Mardi:    {travaille:true, heures:{normal:{debut:'09:00',fin:'18:00',pause:60,actif:true}}},
      Mercredi: {travaille:true, heures:{normal:{debut:'09:00',fin:'18:00',pause:60,actif:true}}},
      Jeudi:    {travaille:true, heures:{normal:{debut:'09:00',fin:'18:00',pause:60,actif:true}}},
      Vendredi: {travaille:true, heures:{normal:{debut:'09:00',fin:'17:00',pause:60,actif:true},sup25:{debut:'17:00',fin:'19:30',pause:0,actif:true}}},
      Samedi:   {travaille:false,heures:{}},
      Dimanche: {travaille:false,heures:{}},
    },
    primes:[{id:'repas',qte:5},{id:'deplacement',qte:3},{id:'primeC',qte:1}],
    commentaire:'',commentaireResponsable:'Validé, RAS.',
  },
  {
    id:'f4',nomIntervenant:'Lucas Petit',equipe:'Équipe Est',semaine:13,annee:2026,
    statut:'validé',dateSoumission:'2026-03-24',dateSaisie:'2026-03-26',
    jours:{
      Lundi:    {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Mardi:    {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Mercredi: {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Jeudi:    {travaille:false,heures:{}},
      Vendredi: {travaille:true, heures:{normal:{debut:'08:00',fin:'17:00',pause:60,actif:true}}},
      Samedi:   {travaille:false,heures:{}},
      Dimanche: {travaille:false,heures:{}},
    },
    primes:[{id:'repas',qte:4},{id:'primeD',qte:1}],
    commentaire:'Absence maladie jeudi — justificatif fourni.',
    commentaireResponsable:'Justificatif reçu. Validé.',
  },
];

// ══════════════════════════════════════════════
//  UI ATOMS
// ══════════════════════════════════════════════
const Badge=({statut})=>{
  const cfg={
    brouillon:{label:'Brouillon',  bg:'#F3F4F6',color:'#6B7280'},
    soumis:   {label:'En attente', bg:'#FEF3C7',color:'#D97706'},
    validé:   {label:'Validé',     bg:'#D1FAE5',color:'#059669'},
    refusé:   {label:'Refusé',     bg:'#FEE2E2',color:'#DC2626'},
  }[statut]||{label:statut,bg:'#F3F4F6',color:'#6B7280'};
  return(
    <span style={{background:cfg.bg,color:cfg.color,fontSize:10,fontWeight:700,
      padding:'3px 10px',borderRadius:20,letterSpacing:'0.07em',textTransform:'uppercase',
      display:'inline-flex',alignItems:'center',gap:5,fontFamily:'Outfit,sans-serif'}}>
      <span style={{width:5,height:5,borderRadius:'50%',background:cfg.color,display:'inline-block'}}/>
      {cfg.label}
    </span>
  );
};

const Btn=({onClick,children,variant='primary',disabled,style={}})=>{
  const base={width:'100%',padding:'15px 20px',border:'none',borderRadius:14,
    fontSize:14,fontWeight:700,fontFamily:'Outfit,sans-serif',cursor:disabled?'not-allowed':'pointer',
    display:'flex',alignItems:'center',justifyContent:'center',gap:8,transition:'all 0.15s',
    opacity:disabled?0.5:1,...style};
  const vars={
    primary:{background:'#1a1a2e',color:'white',boxShadow:'0 4px 20px rgba(26,26,46,0.3)'},
    success:{background:'#059669',color:'white',boxShadow:'0 4px 20px rgba(5,150,105,0.35)'},
    danger: {background:'#DC2626',color:'white',boxShadow:'0 4px 20px rgba(220,38,38,0.3)'},
    ghost:  {background:'#F3F4F6',color:'#374151',boxShadow:'none'},
    outline:{background:'white',color:'#1a1a2e',border:'1.5px solid #E5E7EB',boxShadow:'0 1px 4px rgba(0,0,0,0.06)'},
  };
  return<button onClick={onClick} disabled={disabled} className="btn-press" style={{...base,...vars[variant],...style}}>{children}</button>;
};

const Icon=({name,size=18,color='currentColor'})=>{
  const icons={
    back:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="15,18 9,12 15,6"/></svg>,
    plus:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>,
    check:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><polyline points="20,6 9,17 4,12"/></svg>,
    x:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>,
    clock:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12,6 12,12 16,14"/></svg>,
    user:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>,
    chevron:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2.5" strokeLinecap="round"><polyline points="9,18 15,12 9,6"/></svg>,
    alert:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>,
    clipboard:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M16 4h2a2 2 0 0 1 2 2v14a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V6a2 2 0 0 1 2-2h2"/><rect x="8" y="2" width="8" height="4" rx="1" ry="1"/></svg>,
    ok:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22,4 12,14.01 9,11.01"/></svg>,
    trash:<svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke={color} strokeWidth="2" strokeLinecap="round"><polyline points="3,6 5,6 21,6"/><path d="M19,6v14a2,2,0,0,1-2,2H7a2,2,0,0,1-2-2V6m3,0V4a2,2,0,0,1,2-2h4a2,2,0,0,1,2,2v2"/></svg>,
  };
  return icons[name]||null;
};

// ══════════════════════════════════════════════
//  FICHE DETAIL (lecture)
// ══════════════════════════════════════════════
const FicheDetail=({fiche,onBack,actions})=>{
  const total=totalHeures(fiche.jours);
  const nbJours=Object.values(fiche.jours).filter(j=>j.travaille).length;
  const totalPrimes=fiche.primes.reduce((s,p)=>{
    const def=PRIMES.find(x=>x.id===p.id);
    return s+(def?def.montant*(p.qte||1):0);
  },0);
  return(
    <div className="slide-in" style={{paddingBottom:100}}>
      {/* Header */}
      <div style={{background:'#1a1a2e',padding:'16px 20px 24px',position:'sticky',top:0,zIndex:10}}>
        <button onClick={onBack} style={{background:'none',border:'none',color:'rgba(255,255,255,0.7)',cursor:'pointer',padding:'4px 0',display:'flex',alignItems:'center',gap:6,fontSize:13,fontFamily:'Outfit,sans-serif',marginBottom:16}}>
          <Icon name="back" size={16} color="rgba(255,255,255,0.7)"/>Retour
        </button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:20}}>
          <div>
            <div style={{fontSize:13,color:'rgba(255,255,255,0.5)',marginBottom:4}}>{fiche.nomIntervenant}</div>
            <div style={{fontWeight:800,fontSize:22,color:'white',lineHeight:1.2}}>Semaine {fiche.semaine}</div>
            <div style={{fontSize:12,color:'rgba(255,255,255,0.4)',marginTop:4}}>{semLabel(fiche.semaine,fiche.annee)}</div>
          </div>
          <Badge statut={fiche.statut}/>
        </div>
        <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:12}}>
          {[
            {val:fmtH(total),lbl:'Total heures'},
            {val:`${nbJours}j`,lbl:'Jours travaillés'},
            {val:`${totalPrimes}€`,lbl:'Total primes'},
          ].map(s=>(
            <div key={s.lbl} style={{background:'rgba(255,255,255,0.07)',borderRadius:12,padding:'10px 12px',textAlign:'center'}}>
              <div style={{fontWeight:800,fontSize:20,color:'white',fontFamily:'JetBrains Mono,monospace'}}>{s.val}</div>
              <div style={{fontSize:10,color:'rgba(255,255,255,0.4)',marginTop:2}}>{s.lbl}</div>
            </div>
          ))}
        </div>
      </div>

      <div style={{padding:'16px 16px 0'}}>
        {/* Heures par jour */}
        <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10}}>Détail des heures</div>
        {JOURS.map(jour=>{
          const j=fiche.jours[jour];
          if(!j.travaille)return null;
          const hEntries=Object.entries(j.heures||{}).filter(([,v])=>v.actif&&v.debut&&v.fin);
          const totalJ=hEntries.reduce((s,[,v])=>s+calcH(v.debut,v.fin,v.pause),0);
          return(
            <div key={jour} style={{background:'white',borderRadius:14,padding:'14px 16px',marginBottom:8,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:hEntries.length>0?10:0}}>
                <span style={{fontWeight:700,fontSize:14,color:'#1a1a2e'}}>{jour}</span>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:600,fontSize:13,color:'#1a1a2e'}}>{fmtH(totalJ)}</span>
              </div>
              {hEntries.map(([tid,v])=>{
                const def=TYPES_HEURES.find(t=>t.id===tid);
                const h=calcH(v.debut,v.fin,v.pause);
                return def?(
                  <div key={tid} style={{display:'flex',alignItems:'center',gap:8,padding:'6px 0',borderTop:'1px solid #F3F4F6'}}>
                    <span style={{width:6,height:6,borderRadius:'50%',background:def.color,flexShrink:0}}/>
                    <span style={{fontSize:12,color:'#6B7280',flex:1}}>{def.label}</span>
                    <span style={{fontSize:11,color:'#9CA3AF',fontFamily:'JetBrains Mono,monospace'}}>{v.debut}→{v.fin}</span>
                    <span style={{fontSize:12,fontWeight:600,color:def.color,fontFamily:'JetBrains Mono,monospace',minWidth:32,textAlign:'right'}}>{fmtH(h)}</span>
                  </div>
                ):null;
              })}
            </div>
          );
        })}

        {/* Primes */}
        {fiche.primes.length>0&&(
          <>
            <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',margin:'16px 0 10px'}}>Primes & indemnités</div>
            <div style={{background:'white',borderRadius:14,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.05)',marginBottom:8}}>
              {fiche.primes.map((p,i)=>{
                const def=PRIMES.find(x=>x.id===p.id);
                if(!def)return null;
                return(
                  <div key={p.id} style={{padding:'13px 16px',display:'flex',alignItems:'center',gap:12,borderBottom:i<fiche.primes.length-1?'1px solid #F9FAFB':'none'}}>
                    <span style={{fontSize:18}}>{def.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontSize:13,fontWeight:600,color:'#1a1a2e'}}>{def.label}</div>
                      <div style={{fontSize:11,color:'#9CA3AF'}}>{p.qte} × {def.montant}€</div>
                    </div>
                    <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:14,color:def.color}}>{(def.montant*p.qte)}€</span>
                  </div>
                );
              })}
            </div>
          </>
        )}

        {/* Commentaires */}
        {fiche.commentaire&&(
          <div style={{background:'#F8F9FA',borderRadius:14,padding:16,marginTop:8,borderLeft:'3px solid #E5E7EB'}}>
            <div style={{fontSize:10,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Note intervenant</div>
            <p style={{fontSize:13,color:'#4B5563',lineHeight:1.6,margin:0}}>{fiche.commentaire}</p>
          </div>
        )}
        {fiche.commentaireResponsable&&(
          <div style={{background:fiche.statut==='refusé'?'#FFF5F5':'#F0FDF4',borderRadius:14,padding:16,marginTop:8,borderLeft:`3px solid ${fiche.statut==='refusé'?'#FCA5A5':'#6EE7B7'}`}}>
            <div style={{fontSize:10,fontWeight:700,color:fiche.statut==='refusé'?'#EF4444':'#059669',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:6}}>Commentaire responsable</div>
            <p style={{fontSize:13,color:'#4B5563',lineHeight:1.6,margin:0}}>{fiche.commentaireResponsable}</p>
          </div>
        )}

        {actions&&<div style={{marginTop:20}}>{actions}</div>}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  FORMULAIRE SAISIE
// ══════════════════════════════════════════════
const FormulaireIntervenant=({initial,onSubmit,onCancel})=>{
  const[form,setForm]=useState(initial||{semaine:14,annee:2026,jours:initJours(),primes:[],commentaire:''});
  const[step,setStep]=useState(0); // 0=heures, 1=primes, 2=recap

  const updJour=(jour,field,val)=>setForm(p=>({...p,jours:{...p.jours,[jour]:{...p.jours[jour],[field]:val}}}));
  const updHeure=(jour,tid,field,val)=>setForm(p=>({...p,jours:{...p.jours,[jour]:{...p.jours[jour],heures:{...p.jours[jour].heures,[tid]:{...p.jours[jour].heures[tid],[field]:val}}}}}));
  const addTypeHeure=(jour,tid)=>setForm(p=>({...p,jours:{...p.jours,[jour]:{...p.jours[jour],heures:{...p.jours[jour].heures,[tid]:{debut:'',fin:'',pause:0,actif:true}}}}}));
  const removeTypeHeure=(jour,tid)=>{
    setForm(p=>{
      const h={...p.jours[jour].heures};delete h[tid];
      return{...p,jours:{...p.jours,[jour]:{...p.jours[jour],heures:h}}};
    });
  };
  const updPrime=(pid,qte)=>{
    setForm(p=>{
      const exists=p.primes.find(x=>x.id===pid);
      if(qte===0)return{...p,primes:p.primes.filter(x=>x.id!==pid)};
      if(exists)return{...p,primes:p.primes.map(x=>x.id===pid?{...x,qte}:x)};
      return{...p,primes:[...p.primes,{id:pid,qte}]};
    });
  };

  const total=totalHeures(form.jours);
  const totalPrimes=form.primes.reduce((s,p)=>{const d=PRIMES.find(x=>x.id===p.id);return s+(d?d.montant*p.qte:0);},0);

  const STEPS=['⏱ Heures','🏆 Primes','✅ Résumé'];

  return(
    <div style={{paddingBottom:100}}>
      {/* Header */}
      <div style={{background:'#1a1a2e',padding:'16px 20px 20px',position:'sticky',top:0,zIndex:10}}>
        <button onClick={onCancel} style={{background:'none',border:'none',color:'rgba(255,255,255,0.7)',cursor:'pointer',padding:'4px 0',display:'flex',alignItems:'center',gap:6,fontSize:13,fontFamily:'Outfit,sans-serif',marginBottom:12}}>
          <Icon name="back" size={16} color="rgba(255,255,255,0.7)"/>Annuler
        </button>
        <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:16}}>
          <div>
            <div style={{fontWeight:800,fontSize:18,color:'white'}}>Semaine {form.semaine}</div>
            <div style={{fontSize:11,color:'rgba(255,255,255,0.4)',marginTop:2}}>{semLabel(form.semaine,form.annee)}</div>
          </div>
          <div style={{background:'rgba(255,255,255,0.1)',borderRadius:12,padding:'8px 16px',textAlign:'center'}}>
            <div style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:18,color:'white'}}>{fmtH(total)}</div>
            <div style={{fontSize:10,color:'rgba(255,255,255,0.4)'}}>total</div>
          </div>
        </div>
        {/* Steps */}
        <div style={{display:'flex',gap:6}}>
          {STEPS.map((s,i)=>(
            <button key={i} onClick={()=>setStep(i)}
              style={{flex:1,padding:'8px 4px',background:step===i?'rgba(255,255,255,0.15)':'rgba(255,255,255,0.05)',
                border:'none',borderRadius:10,cursor:'pointer',
                fontSize:11,fontWeight:step===i?700:400,color:step===i?'white':'rgba(255,255,255,0.4)',
                fontFamily:'Outfit,sans-serif',transition:'all 0.2s'}}>
              {s}
            </button>
          ))}
        </div>
      </div>

      <div style={{padding:'16px 16px 0'}}>
        {/* STEP 0 — HEURES */}
        {step===0&&(
          <div className="fade-in">
            <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:12}}>Saisie des heures par jour</div>
            {JOURS.map(jour=>{
              const j=form.jours[jour];
              const hEntries=Object.entries(j.heures||{});
              const totalJ=hEntries.reduce((s,[,v])=>s+(v.actif&&v.debut&&v.fin?calcH(v.debut,v.fin,v.pause):0),0);
              return(
                <div key={jour} style={{background:'white',borderRadius:14,marginBottom:10,overflow:'hidden',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
                  {/* Jour header */}
                  <div onClick={()=>updJour(jour,'travaille',!j.travaille)}
                    style={{padding:'14px 16px',display:'flex',alignItems:'center',gap:12,cursor:'pointer',userSelect:'none'}}>
                    <div style={{width:24,height:24,borderRadius:7,border:j.travaille?'none':'2px solid #D1D5DB',
                      background:j.travaille?'#1a1a2e':'transparent',display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0,transition:'all 0.2s'}}>
                      {j.travaille&&<Icon name="check" size={13} color="white"/>}
                    </div>
                    <span style={{fontWeight:700,fontSize:15,color:j.travaille?'#1a1a2e':'#9CA3AF',flex:1}}>{jour}</span>
                    {j.travaille&&totalJ>0&&(
                      <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:13,color:'#1a1a2e'}}>{fmtH(totalJ)}</span>
                    )}
                  </div>

                  {j.travaille&&(
                    <div style={{borderTop:'1px solid #F3F4F6',padding:'12px 16px'}}>
                      {hEntries.map(([tid,v])=>{
                        const def=TYPES_HEURES.find(t=>t.id===tid);
                        if(!def)return null;
                        return(
                          <div key={tid} style={{marginBottom:10,padding:12,background:'#F9FAFB',borderRadius:10,borderLeft:`3px solid ${def.color}`}}>
                            <div style={{display:'flex',alignItems:'center',justifyContent:'space-between',marginBottom:8}}>
                              <div style={{display:'flex',alignItems:'center',gap:6}}>
                                <span style={{width:8,height:8,borderRadius:'50%',background:def.color,flexShrink:0}}/>
                                <span style={{fontSize:12,fontWeight:600,color:'#374151'}}>{def.label}</span>
                                <span style={{fontSize:10,color:'#9CA3AF'}}>×{def.taux}%</span>
                              </div>
                              {tid!=='normal'&&(
                                <button onClick={()=>removeTypeHeure(jour,tid)}
                                  style={{background:'none',border:'none',cursor:'pointer',color:'#EF4444',padding:2,display:'flex'}}>
                                  <Icon name="trash" size={14} color="#EF4444"/>
                                </button>
                              )}
                            </div>
                            <div style={{display:'flex',gap:8}}>
                              {[['debut','Début'],['fin','Fin']].map(([f,lbl])=>(
                                <div key={f} style={{flex:1}}>
                                  <div style={{fontSize:10,color:'#9CA3AF',marginBottom:4}}>{lbl}</div>
                                  <input type="time" value={v[f]||''} onChange={e=>updHeure(jour,tid,f,e.target.value)}
                                    style={{width:'100%',padding:'9px 10px',border:'1.5px solid #E5E7EB',borderRadius:8,fontSize:14,
                                      fontFamily:'JetBrains Mono,monospace',background:'white',outline:'none',color:'#1a1a2e'}}/>
                                </div>
                              ))}
                              <div style={{width:72}}>
                                <div style={{fontSize:10,color:'#9CA3AF',marginBottom:4}}>Pause</div>
                                <select value={v.pause||0} onChange={e=>updHeure(jour,tid,'pause',Number(e.target.value))}
                                  style={{width:'100%',padding:'9px 8px',border:'1.5px solid #E5E7EB',borderRadius:8,fontSize:12,
                                    fontFamily:'Outfit,sans-serif',background:'white',outline:'none',color:'#1a1a2e'}}>
                                  <option value={0}>—</option>
                                  <option value={30}>30m</option>
                                  <option value={60}>1h</option>
                                  <option value={90}>1h30</option>
                                </select>
                              </div>
                            </div>
                          </div>
                        );
                      })}

                      {/* Ajouter type heure */}
                      <div style={{marginTop:6}}>
                        <div style={{fontSize:10,color:'#9CA3AF',marginBottom:6,fontWeight:600}}>Ajouter un type d'heure :</div>
                        <div style={{display:'flex',flexWrap:'wrap',gap:5}}>
                          {TYPES_HEURES.filter(t=>t.id!=='normal'&&!j.heures[t.id]).map(t=>(
                            <button key={t.id} onClick={()=>addTypeHeure(jour,t.id)}
                              style={{padding:'5px 10px',background:'white',border:`1.5px solid ${t.color}`,borderRadius:8,
                                fontSize:11,fontWeight:600,color:t.color,cursor:'pointer',fontFamily:'Outfit,sans-serif'}}>
                              + {t.label}
                            </button>
                          ))}
                        </div>
                      </div>
                    </div>
                  )}
                </div>
              );
            })}
            <div style={{marginTop:8}}>
              <Btn onClick={()=>setStep(1)}>Suivant — Primes →</Btn>
            </div>
          </div>
        )}

        {/* STEP 1 — PRIMES */}
        {step===1&&(
          <div className="fade-in">
            <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:12}}>Primes et indemnités</div>
            {PRIMES.map(prime=>{
              const sel=form.primes.find(p=>p.id===prime.id);
              const qte=sel?.qte||0;
              return(
                <div key={prime.id} style={{background:'white',borderRadius:14,padding:'14px 16px',marginBottom:8,boxShadow:'0 1px 3px rgba(0,0,0,0.05)',
                  border:`1.5px solid ${qte>0?prime.color:'transparent'}`}}>
                  <div style={{display:'flex',alignItems:'center',gap:12}}>
                    <span style={{fontSize:22,flexShrink:0}}>{prime.icon}</span>
                    <div style={{flex:1}}>
                      <div style={{fontWeight:700,fontSize:14,color:'#1a1a2e'}}>{prime.label}</div>
                      <div style={{fontSize:12,color:'#9CA3AF'}}>{prime.montant}€ {prime.unite}</div>
                    </div>
                    {/* Quantité stepper */}
                    <div style={{display:'flex',alignItems:'center',gap:8}}>
                      <button onClick={()=>updPrime(prime.id,Math.max(0,qte-1))}
                        style={{width:32,height:32,borderRadius:10,border:'1.5px solid #E5E7EB',background:qte>0?prime.color:'white',cursor:'pointer',
                          display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
                        <Icon name="x" size={13} color={qte>0?'white':'#9CA3AF'}/>
                      </button>
                      <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:16,minWidth:20,textAlign:'center',color:qte>0?prime.color:'#D1D5DB'}}>
                        {qte}
                      </span>
                      <button onClick={()=>updPrime(prime.id,qte+1)}
                        style={{width:32,height:32,borderRadius:10,border:'1.5px solid #E5E7EB',background:prime.color,cursor:'pointer',
                          display:'flex',alignItems:'center',justifyContent:'center',transition:'all 0.15s'}}>
                        <Icon name="plus" size={13} color="white"/>
                      </button>
                    </div>
                    {qte>0&&(
                      <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:700,fontSize:13,color:prime.color,minWidth:42,textAlign:'right'}}>
                        {prime.montant*qte}€
                      </span>
                    )}
                  </div>
                </div>
              );
            })}
            {totalPrimes>0&&(
              <div style={{background:'#1a1a2e',borderRadius:14,padding:'14px 20px',marginTop:4,display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                <span style={{fontSize:13,color:'rgba(255,255,255,0.6)',fontWeight:600}}>Total primes</span>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontWeight:800,fontSize:20,color:'white'}}>{totalPrimes}€</span>
              </div>
            )}
            <div style={{marginTop:12}}>
              <Btn onClick={()=>setStep(2)}>Suivant — Résumé →</Btn>
            </div>
          </div>
        )}

        {/* STEP 2 — RECAP */}
        {step===2&&(
          <div className="fade-in">
            <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:12}}>Récapitulatif & envoi</div>

            {/* Résumé heures */}
            <div style={{background:'white',borderRadius:14,padding:'16px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
              <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:10}}>Heures</div>
              {JOURS.filter(j=>form.jours[j].travaille).map(jour=>{
                const j=form.jours[jour];
                const totalJ=Object.values(j.heures||{}).reduce((s,v)=>s+(v.actif&&v.debut&&v.fin?calcH(v.debut,v.fin,v.pause):0),0);
                return(
                  <div key={jour} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #F3F4F6'}}>
                    <span style={{fontSize:13,color:'#374151',fontWeight:500}}>{jour}</span>
                    <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,fontWeight:700,color:'#1a1a2e'}}>{fmtH(totalJ)}</span>
                  </div>
                );
              })}
              <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0 0'}}>
                <span style={{fontSize:13,color:'#1a1a2e',fontWeight:700}}>Total</span>
                <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:15,fontWeight:800,color:'#1a1a2e'}}>{fmtH(total)}</span>
              </div>
            </div>

            {/* Résumé primes */}
            {form.primes.length>0&&(
              <div style={{background:'white',borderRadius:14,padding:'16px',marginBottom:10,boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
                <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:10}}>Primes</div>
                {form.primes.map(p=>{
                  const d=PRIMES.find(x=>x.id===p.id);
                  return d?(
                    <div key={p.id} style={{display:'flex',justifyContent:'space-between',padding:'7px 0',borderBottom:'1px solid #F3F4F6'}}>
                      <span style={{fontSize:13,color:'#374151'}}>{d.icon} {d.label} ×{p.qte}</span>
                      <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:13,fontWeight:700,color:d.color}}>{d.montant*p.qte}€</span>
                    </div>
                  ):null;
                })}
                <div style={{display:'flex',justifyContent:'space-between',padding:'10px 0 0'}}>
                  <span style={{fontSize:13,color:'#1a1a2e',fontWeight:700}}>Total primes</span>
                  <span style={{fontFamily:'JetBrains Mono,monospace',fontSize:15,fontWeight:800,color:'#059669'}}>{totalPrimes}€</span>
                </div>
              </div>
            )}

            {/* Commentaire */}
            <div style={{marginBottom:12}}>
              <div style={{fontSize:11,fontWeight:700,color:'#9CA3AF',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}}>Commentaire (optionnel)</div>
              <textarea value={form.commentaire} onChange={e=>setForm(p=>({...p,commentaire:e.target.value}))}
                placeholder="Informations complémentaires pour votre responsable..."
                style={{width:'100%',padding:14,border:'1.5px solid #E5E7EB',borderRadius:12,fontSize:13,
                  fontFamily:'Outfit,sans-serif',background:'white',minHeight:90,resize:'none',
                  outline:'none',color:'#1a1a2e',lineHeight:1.6}}/>
            </div>

            <Btn variant="success" onClick={()=>onSubmit(form)}>
              <Icon name="check" size={18} color="white"/>
              Envoyer au responsable
            </Btn>
          </div>
        )}
      </div>
    </div>
  );
};

// ══════════════════════════════════════════════
//  APP PRINCIPALE
// ══════════════════════════════════════════════
export default function App(){
  const[role,setRole]=useState(null);
  const[view,setView]=useState('list');

    setFiches(p=>p.map(f=>f.id===id?{...f,statut:'validé',commentaireResponsable:'Validé ✓',dateSaisie:null}:f));
    back();
  };
  const refuser=id=>{
    setFiches(p=>p.map(f=>f.id===id?{...f,statut:'refusé',commentaireResponsable:refusMotif}:f));
    back();
  };
  const marquerSaisi=id=>{
    setFiches(p=>p.map(f=>f.id===id?{...f,dateSaisie:new Date().toISOString().split('T')[0]}:f));
    back();
  };

        <div className="fade-up" style={{marginBottom:48,textAlign:'center'}}>
          <div style={{width:72,height:72,background:'#1a1a2e',borderRadius:22,display:'flex',alignItems:'center',justifyContent:'center',
            margin:'0 auto 20px',boxShadow:'0 12px 40px rgba(26,26,46,0.25)'}}>
            <Icon name="clock" size={34} color="white"/>
          </div>
          <h1 style={{fontFamily:'Outfit,sans-serif',fontSize:32,fontWeight:900,color:'#1a1a2e',margin:'0 0 6px',letterSpacing:'-0.5px'}}>
            PointagePro
          </h1>
          <p style={{color:'#9CA3AF',fontSize:14,margin:0}}>Gestion des fiches de semaine</p>
        </div>

        <div className="fade-up" style={{animationDelay:'0.1s',width:'100%',marginBottom:12}}>
          <p style={{fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.08em',textTransform:'uppercase',textAlign:'center',marginBottom:14}}>
            Connexion en tant que
          </p>
          {[
            {id:'intervenant',label:'Intervenant',   sub:'Saisir mes heures',    icon:'user',    accent:'#2563EB'},
            {id:'responsable',label:'Responsable',   sub:'Valider les fiches',   icon:'ok',      accent:'#059669'},
            {id:'assistante', label:'Assistante RH', sub:'Suivi & saisie paie',  icon:'clipboard',accent:'#DC2626'},
          ].map((r,i)=>(
            <button key={r.id} onClick={()=>{setRole(r.id);setView('list');}}
              className="card-hover btn-press"
              style={{animationDelay:`${0.15+i*0.06}s`,width:'100%',padding:'16px 20px',
                background:'white',border:'none',borderRadius:16,display:'flex',alignItems:'center',gap:14,
                marginBottom:10,cursor:'pointer',boxShadow:'0 2px 8px rgba(0,0,0,0.06)',fontFamily:'Outfit,sans-serif'}}>
              <div style={{width:46,height:46,background:r.accent+'15',borderRadius:13,display:'flex',alignItems:'center',justifyContent:'center',flexShrink:0}}>
                <Icon name={r.icon} size={22} color={r.accent}/>
              </div>
              <div style={{textAlign:'left',flex:1}}>
                <div style={{fontWeight:800,color:'#1a1a2e',fontSize:16}}>{r.label}</div>
                <div style={{color:'#9CA3AF',fontSize:12,marginTop:2}}>{r.sub}</div>
              </div>
              <Icon name="chevron" size={18} color="#D1D5DB"/>
            </button>
          ))}
        </div>
        <p style={{fontSize:11,color:'#C4C7CE',textAlign:'center',marginTop:16}}>
          Prototype de démonstration — données simulées
        </p>
      </div>
    </div>
  );

  const hdrBase={background:'#1a1a2e',padding:'14px 20px',display:'flex',alignItems:'center',
    gap:12,position:'sticky',top:0,zIndex:10};
  const roleLabel={intervenant:'Marie Dupont',responsable:'Jean Martin',assistante:'Claire Dubois'}[role];
  const roleAccent={intervenant:'#2563EB',responsable:'#059669',assistante:'#DC2626'}[role];

    <div style={hdrBase}>
      <button onClick={()=>setRole(null)} style={{background:'none',border:'none',color:'rgba(255,255,255,0.5)',cursor:'pointer',padding:4,display:'flex'}}>
        <Icon name="back" size={20} color="rgba(255,255,255,0.5)"/>
      </button>
      <div style={{flex:1}}>
        <div style={{fontWeight:800,fontSize:16,color:'white',fontFamily:'Outfit,sans-serif'}}>{title}</div>

        <Icon name="user" size={16} color="white"/>
      </div>
    </div>
  );

  const cardSt={background:'white',borderRadius:14,padding:'16px',marginBottom:10,
    boxShadow:'0 1px 3px rgba(0,0,0,0.05)',cursor:'pointer'};
  const secLbl={fontSize:11,fontWeight:700,color:'#9CA3AF',letterSpacing:'0.07em',textTransform:'uppercase',marginBottom:10};

  // ─── INTERVENANT ───
  if(role==='intervenant'){
    if(view==='form') return(
      <div style={wrap}>
        <FormulaireIntervenant initial={formInitial} onSubmit={handleSubmitFiche} onCancel={back}/>
      </div>
    );
    if(view==='detail'&&selected) return(
      <div style={wrap}>
        <FicheDetail fiche={selected} onBack={back} actions={
          selected.statut==='refusé'?(
            <Btn variant="primary" onClick={()=>{setFormInitial({...selected,statut:'brouillon',commentaireResponsable:''});setView('form');}}>
              <Icon name="check" size={18} color="white"/>Modifier et renvoyer
            </Btn>
          ):null
        }/>
      </div>
    );
    return(
      <div style={wrap}>
        <TopBar title="Mes fiches"/>
        <div style={{padding:'16px 16px 100px'}}>
          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr 1fr',gap:8,marginBottom:20}}>
            {[
              {n:myFiches.filter(f=>f.statut==='soumis').length, label:'En attente',color:'#F59E0B'},
              {n:myFiches.filter(f=>f.statut==='validé').length, label:'Validées',  color:'#059669'},
              {n:myFiches.filter(f=>f.statut==='refusé').length, label:'Refusées',  color:'#DC2626'},
            ].map(s=>(
              <div key={s.label} style={{background:'white',borderRadius:12,padding:'12px 8px',textAlign:'center',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
                <div style={{fontWeight:800,fontSize:26,color:s.color,fontFamily:'JetBrains Mono,monospace'}}>{s.n}</div>
                <div style={{fontSize:10,color:'#9CA3AF',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          <div style={secLbl}>Mes fiches de semaine</div>
          {myFiches.length===0&&<p style={{color:'#9CA3AF',textAlign:'center',padding:40}}>Aucune fiche pour l'instant</p>}
          {myFiches.map(f=>(
            <div key={f.id} className="card-hover" style={cardSt} onClick={()=>go('detail',f)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'flex-start',marginBottom:10}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>Semaine {f.semaine}</div>
                  <div style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>{semLabel(f.semaine,f.annee)}</div>
                </div>
                <Badge statut={f.statut}/>
              </div>
              <div style={{display:'flex',gap:12,alignItems:'center'}}>
                <div style={{display:'flex',alignItems:'center',gap:5,fontSize:13,color:'#374151'}}>
                  <Icon name="clock" size={13} color="#9CA3AF"/>
                  <span style={{fontWeight:700,fontFamily:'JetBrains Mono,monospace'}}>{fmtH(totalHeures(f.jours))}</span>
                </div>
                {f.primes.length>0&&<span style={{fontSize:12,color:'#9CA3AF'}}>{f.primes.length} prime{f.primes.length>1?'s':''}</span>}
                <span style={{marginLeft:'auto',fontSize:11,color:'#C4C7CE'}}>{f.dateSoumission}</span>
              </div>
              {f.statut==='refusé'&&f.commentaireResponsable&&(
                <div style={{marginTop:10,padding:'8px 12px',background:'#FEF2F2',borderRadius:8,fontSize:12,color:'#DC2626',display:'flex',gap:6,alignItems:'flex-start'}}>
                  <Icon name="alert" size={13} color="#DC2626"/>
                  <span>{f.commentaireResponsable}</span>
                </div>
              )}
            </div>
          ))}
        </div>
        {/* FAB */}
        <div style={{position:'sticky',bottom:0,background:'linear-gradient(transparent,#EDEAE4 40%)',padding:'20px 16px 28px'}}>
          <Btn onClick={()=>{setFormInitial(null);setView('form');}}>
            <Icon name="plus" size={20} color="white"/>Nouvelle fiche de semaine
          </Btn>
        </div>
      </div>
    );
  }

  // ─── RESPONSABLE ───
  if(role==='responsable'){
    if(view==='review'&&selected) return(
      <div style={wrap}>
        <FicheDetail fiche={selected} onBack={back} actions={
          <div>
            {showRefus?(
              <div style={{background:'white',borderRadius:14,padding:16}}>
                <div style={{fontSize:11,fontWeight:700,color:'#DC2626',textTransform:'uppercase',letterSpacing:'0.07em',marginBottom:8}}>Motif de refus</div>
                <textarea value={refusMotif} onChange={e=>setRefusMotif(e.target.value)}
                  placeholder="Expliquer le problème à l'intervenant..."
                  style={{width:'100%',padding:12,border:'1.5px solid #FCA5A5',borderRadius:10,fontSize:13,
                    fontFamily:'Outfit,sans-serif',minHeight:80,resize:'none',outline:'none',color:'#1a1a2e',marginBottom:10}}/>
                <div style={{display:'flex',gap:8}}>
                  <Btn variant="ghost" onClick={()=>setShowRefus(false)} style={{flex:1}}>Annuler</Btn>
                  <Btn variant="danger" onClick={()=>refuser(selected.id)} disabled={!refusMotif.trim()} style={{flex:2}}>
                    <Icon name="x" size={16} color="white"/>Confirmer le refus
                  </Btn>
                </div>
              </div>
            ):(
              <div style={{display:'flex',gap:10}}>
                <Btn variant="ghost" onClick={()=>setShowRefus(true)} style={{flex:1,color:'#DC2626'}}>
                  <Icon name="x" size={18} color="#DC2626"/>Refuser
                </Btn>
                <Btn variant="success" onClick={()=>valider(selected.id)} style={{flex:2}}>
                  <Icon name="check" size={18} color="white"/>Valider
                </Btn>
              </div>
            )}
          </div>
        }/>
      </div>
    );
    return(
      <div style={wrap}>
        <TopBar title="Fiches à valider"/>
        <div style={{padding:'16px 16px 24px'}}>
          {pendingFiches.length>0&&(
            <div style={{background:'#FFFBEB',borderRadius:12,padding:'12px 16px',marginBottom:16,
              display:'flex',alignItems:'center',gap:10,border:'1px solid #FDE68A'}}>
              <Icon name="alert" size={17} color="#D97706"/>
              <span style={{fontSize:13,color:'#92400E',fontWeight:600}}>
                {pendingFiches.length} fiche{pendingFiches.length>1?'s':''} en attente de validation
              </span>
            </div>
          )}
          {pendingFiches.length===0&&(
            <div style={{textAlign:'center',padding:'60px 20px'}}>
              <div style={{width:64,height:64,background:'#D1FAE5',borderRadius:20,display:'flex',alignItems:'center',justifyContent:'center',margin:'0 auto 16px'}}>
                <Icon name="ok" size={32} color="#059669"/>
              </div>
              <p style={{color:'#6B7280',fontSize:15,fontWeight:600}}>Tout est à jour !</p>
              <p style={{color:'#9CA3AF',fontSize:13}}>Aucune fiche en attente</p>
            </div>
          )}
          {pendingFiches.map(f=>(
            <div key={f.id} className="card-hover" style={{...cardSt,border:'1px solid #E5E7EB'}} onClick={()=>go('review',f)}>
              <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                <div>
                  <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>{f.nomIntervenant}</div>
                  <div style={{fontSize:12,color:'#9CA3AF',marginTop:2}}>Semaine {f.semaine} — {semLabel(f.semaine,f.annee)}</div>
                </div>
                <Icon name="chevron" size={18} color="#D1D5DB"/>
              </div>
              <div style={{display:'flex',gap:12,alignItems:'center',fontSize:13}}>
                <span style={{fontWeight:700,fontFamily:'JetBrains Mono,monospace',color:'#1a1a2e'}}>{fmtH(totalHeures(f.jours))}</span>
                {f.primes.length>0&&<span style={{color:'#9CA3AF',fontSize:12}}>{f.primes.length} prime{f.primes.length>1?'s':''}</span>}
                <span style={{fontSize:11,color:'#C4C7CE',marginLeft:'auto'}}>Soumis le {f.dateSoumission}</span>
              </div>
            </div>
          ))}
        </div>
      </div>
    );
  }

  // ─── ASSISTANTE ───
  if(role==='assistante'){
    const toSaisir=validatedFiches.filter(f=>!f.dateSaisie);
    const saisies=validatedFiches.filter(f=>f.dateSaisie);
    if(view==='detail'&&selected) return(
      <div style={wrap}>
        <FicheDetail fiche={selected} onBack={back} actions={
          !selected.dateSaisie?(
            <Btn variant="primary" onClick={()=>marquerSaisi(selected.id)}>
              <Icon name="ok" size={18} color="white"/>Marquer comme saisi dans le logiciel
            </Btn>
          ):(
            <div style={{textAlign:'center',padding:20,color:'#059669'}}>
              <Icon name="ok" size={24} color="#059669"/>
              <p style={{marginTop:8,fontWeight:700,fontSize:14}}>Saisi le {selected.dateSaisie}</p>
            </div>
          )
        }/>
      </div>
    );
    return(
      <div style={wrap}>
        <TopBar title="Suivi des pointages"/>
        <div style={{padding:'16px 16px 24px'}}>
          {/* KPIs */}
          <div style={{display:'grid',gridTemplateColumns:'1fr 1fr',gap:8,marginBottom:20}}>
            {[
              {n:toSaisir.length, label:'À saisir',color:'#DC2626'},
              {n:saisies.length,  label:'Saisies',  color:'#059669'},
            ].map(s=>(
              <div key={s.label} style={{background:'white',borderRadius:12,padding:'14px 16px',boxShadow:'0 1px 3px rgba(0,0,0,0.05)'}}>
                <div style={{fontWeight:900,fontSize:32,color:s.color,fontFamily:'JetBrains Mono,monospace'}}>{s.n}</div>
                <div style={{fontSize:11,color:'#9CA3AF',marginTop:2}}>{s.label}</div>
              </div>
            ))}
          </div>

          {toSaisir.length>0&&(
            <>
              <div style={{...secLbl,color:'#DC2626'}}>À SAISIR ({toSaisir.length})</div>
              {toSaisir.map(f=>(
                <div key={f.id} className="card-hover" style={{...cardSt,border:'1.5px solid #FECACA'}} onClick={()=>go('detail',f)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:8}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>{f.nomIntervenant}</div>
                      <div style={{fontSize:12,color:'#9CA3AF'}}>Semaine {f.semaine} — {semLabel(f.semaine,f.annee)}</div>
                    </div>
                    <Icon name="chevron" size={18} color="#DC2626"/>
                  </div>
                  <div style={{fontSize:13,fontWeight:700,fontFamily:'JetBrains Mono,monospace',color:'#1a1a2e'}}>
                    {fmtH(totalHeures(f.jours))}
                    {f.primes.length>0&&<span style={{fontFamily:'Outfit,sans-serif',fontWeight:400,fontSize:12,color:'#9CA3AF',marginLeft:8}}>{f.primes.length} prime{f.primes.length>1?'s':''}</span>}
                  </div>
                </div>
              ))}
            </>
          )}

          {saisies.length>0&&(
            <>
              <div style={{...secLbl,marginTop:toSaisir.length?20:0}}>DÉJÀ SAISIES ({saisies.length})</div>
              {saisies.map(f=>(
                <div key={f.id} className="card-hover" style={{...cardSt,opacity:0.65}} onClick={()=>go('detail',f)}>
                  <div style={{display:'flex',justifyContent:'space-between',alignItems:'center'}}>
                    <div>
                      <div style={{fontWeight:800,fontSize:15,color:'#1a1a2e'}}>{f.nomIntervenant}</div>
                      <div style={{fontSize:12,color:'#9CA3AF'}}>Sem. {f.semaine} — Saisi le {f.dateSaisie}</div>
                    </div>
                    <Icon name="ok" size={20} color="#059669"/>
                  </div>
                </div>
              ))}
            </>
          )}
          {validatedFiches.length===0&&(
            <p style={{color:'#9CA3AF',textAlign:'center',padding:40}}>Aucune fiche validée pour l'instant</p>
          )}
        </div>
      </div>
    );
  }
  return null;
}

const root=ReactDOM.createRoot(document.getElementById('root'));
root.render(React.createElement(App));
</script>
</body>
</html>
